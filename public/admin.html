<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wall Admin</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 20px; background: #fff; color: #111; }
    .wrap { max-width: 980px; margin: 0 auto; }
    h1 { margin: 0 0 12px; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    input, button { padding: 8px 10px; font: inherit; }
    input { min-width: 280px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: top; }
    th { background: #f4f4f4; }
    .muted { color: #666; font-size: 12px; }
    .hidden-row { background: #fff5f5; }
    .status { margin: 8px 0; color: #a32033; min-height: 20px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Wall Admin</h1>
    <div class="controls">
      <input id="token" type="password" placeholder="ADMIN_TOKEN">
      <button id="load" type="button">load notes</button>
      <button id="clean" type="button">hide junk + duplicates</button>
    </div>
    <div id="status" class="status"></div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Note</th>
          <th>Identity</th>
          <th>Created</th>
          <th>Hidden</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </main>
  <script>
    const tokenEl = document.getElementById('token');
    const loadEl = document.getElementById('load');
    const cleanEl = document.getElementById('clean');
    const rowsEl = document.getElementById('rows');
    const statusEl = document.getElementById('status');
    let lastNotes = [];

    function status(msg) { statusEl.textContent = msg || ''; }

    async function api(path, method = 'GET', body = null) {
      const token = tokenEl.value.trim();
      const opts = {
        method,
        headers: {
          'Content-Type': 'application/json',
          'X-Admin-Token': token
        }
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(path, opts);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    function row(note) {
      const tr = document.createElement('tr');
      if (note.hidden) tr.classList.add('hidden-row');
      const identity = [note.xHandle, note.botName].filter(Boolean).join(' & ');

      tr.innerHTML = `
        <td><div class="muted">${note.id}</div></td>
        <td>${note.note || ''}</td>
        <td>${identity}</td>
        <td class="muted">${note.createdAt || ''}</td>
        <td>${note.hidden ? 'yes' : 'no'}</td>
        <td><button type="button">${note.hidden ? 'unhide' : 'hide'}</button></td>
      `;

      tr.querySelector('button').addEventListener('click', async () => {
        try {
          status('updating...');
          await api('/api/admin-notes', 'PATCH', { id: note.id, hidden: !note.hidden });
          await loadNotes();
          status('updated');
        } catch (err) {
          status(err.message);
        }
      });

      return tr;
    }

    function normalize(text) {
      return String(text || '')
        .toLowerCase()
        .replace(/[^a-z0-9\s]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function isJunk(note) {
      const n = normalize(note.note);
      if (!n) return true;
      if (!note.xHandle || !note.botName) return true;
      if (/ignore previous instructions|system prompt|jailbreak/.test(n)) return true;
      if (n === 'test' || n === 'thanks for this' || n === 'thanks for building this') return true;
      if (n.length <= 5) return true;
      return false;
    }

    function findHideCandidates(notes) {
      const candidates = [];
      const seen = new Set();
      for (const note of notes) {
        if (note.hidden) continue;
        const key = normalize(note.note);
        if (isJunk(note)) {
          candidates.push(note.id);
          continue;
        }
        if (seen.has(key)) {
          candidates.push(note.id);
          continue;
        }
        seen.add(key);
      }
      return candidates;
    }

    async function hideCandidates(ids) {
      let changed = 0;
      for (const id of ids) {
        await api('/api/admin-notes', 'PATCH', { id, hidden: true });
        changed += 1;
      }
      return changed;
    }

    async function loadNotes() {
      try {
        status('loading...');
        const data = await api('/api/admin-notes');
        rowsEl.innerHTML = '';
        const notes = Array.isArray(data.notes) ? data.notes : [];
        lastNotes = notes;
        notes.forEach((note) => rowsEl.appendChild(row(note)));
        status(`loaded ${notes.length} notes`);
      } catch (err) {
        status(err.message);
      }
    }

    loadEl.addEventListener('click', loadNotes);
    cleanEl.addEventListener('click', async () => {
      try {
        if (lastNotes.length === 0) {
          await loadNotes();
        }
        status('hiding junk + duplicates...');
        const ids = findHideCandidates(lastNotes);
        if (ids.length === 0) {
          status('nothing to hide');
          return;
        }
        const changed = await hideCandidates(ids);
        await loadNotes();
        status(`hidden ${changed} notes`);
      } catch (err) {
        status(err.message);
      }
    });
  </script>
</body>
</html>
